services:
  - type: web
    name: black-rococo-functional-site
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_EMAIL
        value: admin@blackrococo.mx
      - key: ADMIN_PASSWORD
        sync: false
